name: Daily AI Refresh
on:
  schedule:
    - cron: '0 0 * * *' # This runs every night at midnight
  workflow_dispatch: # This adds a "Run" button so you can test it now

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify
        run: curl -X POST -d {} ${{ secrets.NETLIFY_HOOK }}
